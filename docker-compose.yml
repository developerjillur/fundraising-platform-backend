version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-fundraising_db}
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=${DB_NAME:-fundraising_db}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PORT=3000
    networks:
      - dokploy-network
      - default
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    networks:
      - dokploy-network
      - default
    depends_on:
      - backend

  obs-service:
    build:
      context: ./obs-service
      dockerfile: Dockerfile
    container_name: burger-obs-service
    restart: unless-stopped
    environment:
      - BACKEND_API_URL=http://backend:3000/api
      - OBS_WS_URL=ws://host.docker.internal:4455
      - OBS_WS_PASSWORD=${OBS_WS_PASSWORD:-}
      - API_POLL_INTERVAL_MS=3000
      - SCREENSHOT_ENABLED=true
    depends_on:
      - backend
    networks:
      - default

volumes:
  mysql_data:

networks:
  dokploy-network:
    external: true
